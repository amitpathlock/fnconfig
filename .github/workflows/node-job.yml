name: Reusable Node Job

on:
  workflow_call:
    inputs:
      job-name:
        description: "Display name of the job"
        required: true
        type: string
      run-command:
        description: "Command to execute after dependency install"
        required: false
        type: string
      upload-artifact:
        description: "Whether to upload an artifact"
        required: false
        type: boolean
        default: false
      artifact-name:
        description: "Name of artifact"
        required: false
        type: string
      artifact-path:
        description: "Path of artifact to upload"
        required: false
        type: string
      retention-days:
        description: "Artifact retention period"
        required: false
        type: number
        default: 5

jobs:
  node-job:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Command
        if: ${{ inputs.run-command != '' }}
        run: ${{ inputs.run-command }}

      - name: Upload Artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}